<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FAFATRAINING ELITE COACH SYSTEM</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
body{background:#0b0b12;color:white;font-family:Arial;margin:0;padding:20px}
h1{color:#39ff14}
.card{background:#141420;padding:15px;border-radius:15px;margin-bottom:15px}
button{padding:10px 15px;border-radius:10px;border:none;background:#39ff14;font-weight:bold}
</style>
</head>
<body>

<h1>FAFATRAINING ELITE COACH SYSTEM</h1>

<button onclick="generate()">Créer séance</button>

<div id="output"></div>

<script>
let data=null;
fetch("data.json").then(r=>r.json()).then(d=>data=d);

function generate(){
 let ex=data.exercises[Math.floor(Math.random()*data.exercises.length)];
 document.getElementById("output").innerHTML=`
 <div class="card">
 <h2>${ex.name}</h2>
 <p><b>Muscle :</b> ${ex.muscle}</p>
 <p><b>Séries :</b> ${ex.sets}</p>
 <p><b>Répétitions :</b> ${ex.reps}</p>
 <p><b>Repos :</b> ${ex.rest}</p>
 <p><b>Intensité :</b> ${ex.intensity}</p>
 <p><b>Charge :</b> ${ex.percent}</p>
 <p><b>Comment faire :</b> ${ex.description}</p>
 <p><b>Variante :</b> ${ex.variant}</p>
 </div>`;
}
</script>

</body>
</html>
